<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOM高亮测试</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    
    .dom-element-highlight {
      outline: 2px solid #FF5722 !important;
      outline-offset: 0 !important;
      background-color: rgba(255, 87, 34, 0.1) !important;
      box-shadow: 0 0 10px rgba(255, 87, 34, 0.5) !important;
      position: relative !important;
      z-index: 999999 !important;
    }
    
    .dom-element-hover-highlight {
      outline: 2px solid #2196F3 !important;
      outline-offset: 0 !important;
      background-color: rgba(33, 150, 243, 0.1) !important;
      box-shadow: 0 0 8px rgba(33, 150, 243, 0.4) !important;
      position: relative !important;
      z-index: 999998 !important;
    }
    
    .controls {
      margin-bottom: 20px;
    }
    
    input, button {
      padding: 8px;
      margin-right: 10px;
    }
    
    #preview-container {
      border: 1px solid #ccc;
      height: 500px;
      overflow: auto;
    }
    
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <h1>DOM高亮功能测试</h1>
  
  <div class="controls">
    <input type="text" id="url-input" placeholder="输入URL" value="https://example.com" style="width: 300px;">
    <button onclick="loadPage()">加载页面</button>
    <button onclick="clearHighlights()">清除高亮</button>
  </div>
  
  <div id="preview-container">
    <iframe id="preview-frame"></iframe>
  </div>
  
  <div id="element-info" style="margin-top: 20px; padding: 10px; background: #f5f5f5; border-radius: 4px;">
    <h3>元素信息</h3>
    <pre id="info-output">将鼠标悬停在元素上以查看信息</pre>
  </div>

  <script src="config.js?v=1"></script>
  <script>
    async function loadPage() {
      const urlInput = document.getElementById('url-input');
      const targetUrl = urlInput.value.trim();
      
      if (!targetUrl) {
        alert('请输入URL');
        return;
      }
      
      try {
        const response = await fetch(`${API_BASE_URL}/page-renderer/render`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ 
            url: targetUrl,
            waitForAjax: true,
            ajaxWaitTime: 2000,
            waitForNetworkIdle: true
          })
        });
        
        if (!response.ok) {
          throw new Error(`API请求失败: ${response.status}`);
        }
        
        const data = await response.json();
        
        // 将渲染后的HTML内容加载到iframe
        const blob = new Blob([data.html], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const iframe = document.getElementById('preview-frame');
        iframe.src = url;
        
        // 监听iframe加载完成
        iframe.onload = function() {
          // 添加鼠标悬停事件监听器
          setTimeout(() => {
            try {
              const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
              
              // 添加鼠标悬停事件
              iframeDoc.addEventListener('mouseover', function(e) {
                if (window.highlightMode === 'select') {
                  if (window.FeedGenDOMHighlighter) {
                    window.FeedGenDOMHighlighter.highlightElement(e.target, true);
                  }
                }
              });
              
              iframeDoc.addEventListener('mouseout', function(e) {
                if (window.highlightMode === 'select' && 
                    window.FeedGenDOMHighlighter && 
                    window.FeedGenDOMHighlighter.getCurrentSelectedElement() !== e.target) {
                  window.FeedGenDOMHighlighter.clearHighlight();
                }
              });
              
              iframeDoc.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                
                if (window.FeedGenDOMHighlighter) {
                  window.FeedGenDOMHighlighter.highlightElement(e.target, false);
                  
                  // 显示元素信息
                  const elementInfo = {
                    tag: e.target.tagName,
                    id: e.target.id,
                    className: e.target.className,
                    text: e.target.textContent.substring(0, 100),
                    attributes: Array.from(e.target.attributes).reduce((acc, attr) => {
                      acc[attr.name] = attr.value;
                      return acc;
                    }, {})
                  };
                  
                  document.getElementById('info-output').textContent = JSON.stringify(elementInfo, null, 2);
                }
              });
            } catch (e) {
              console.error('添加事件监听器失败:', e);
            }
          }, 500);
        };
      } catch (error) {
        console.error('加载页面失败:', error);
        alert('加载页面失败: ' + error.message);
      }
    }
    
    function clearHighlights() {
      const iframe = document.getElementById('preview-frame');
      try {
        if (iframe.contentWindow && iframe.contentWindow.FeedGenDOMHighlighter) {
          iframe.contentWindow.FeedGenDOMHighlighter.clearAllHighlights();
        }
      } catch (e) {
        console.error('清除高亮失败:', e);
      }
    }
    
    // 页面加载时加载示例页面
    window.onload = function() {
      // loadPage(); // 取消注释以自动加载
    };
  </script>
</body>
</html>

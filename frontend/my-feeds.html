<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的feeds - FeedGen</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/x-icon" href="icons/favicon.ico">
</head>
<body class="article-list-page">
  <div id="global-header"></div>

  <main class="article-list-main">
    <header class="article-list-header">
      <h1 class="article-list-title">我的feeds</h1>
      <p class="article-list-desc">外部订阅（原生 RSS）与自建 Feed（解析生成）分开展示；支持分组、订阅及与同款的表格管理能力。</p>
    </header>

    <div id="article-list-auth-msg" class="my-feeds-banner my-feeds-banner--warn hidden" role="status">
      未检测到登录状态。请先到 <a href="login.html">登录页</a> 登录。
    </div>

    <section class="article-list-panel">
      <div class="my-feeds-toolbar">
        <h2>我的订阅列表</h2>
        <span class="my-feeds-count" id="native-feeds-count"></span>
        <button type="button" id="article-list-refresh" class="secondary-btn">刷新</button>
      </div>
      <p class="article-list-desc my-feeds-section-hint">以下为外部订阅源（数据库中标记为原生 RSS）。</p>
      <div class="my-feeds-table-wrap">
        <table class="my-feeds-table">
          <thead>
            <tr>
              <th>图标</th>
              <th>Feed 标题</th>
              <th>Feed URL</th>
              <th>分组</th>
              <th>类型</th>
              <th>状态</th>
              <th>反爬状态</th>
              <th>更新间隔</th>
              <th>上次更新</th>
              <th>RSS</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="article-list-tbody"></tbody>
        </table>
      </div>
      <div id="article-list-empty" class="my-feeds-empty hidden">暂无外部订阅。</div>
    </section>

    <section class="article-list-panel">
      <div class="my-feeds-toolbar">
        <h2>我的 Feed</h2>
        <span class="my-feeds-count" id="parsed-feeds-count"></span>
        <button type="button" id="parsed-feeds-refresh" class="secondary-btn">刷新</button>
      </div>
      <p class="article-list-desc my-feeds-section-hint">以下为你自行创建或解析生成的 Feed。</p>
      <div class="my-feeds-table-wrap">
        <table class="my-feeds-table">
          <thead>
            <tr>
              <th>图标</th>
              <th>Feed 标题</th>
              <th>Feed URL</th>
              <th>分组</th>
              <th>类型</th>
              <th>状态</th>
              <th>更新间隔</th>
              <th>上次更新</th>
              <th>RSS</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="parsed-feeds-tbody"></tbody>
        </table>
      </div>
      <div id="parsed-feeds-empty" class="my-feeds-empty hidden">暂无自建 Feed，可到 <a href="index.html">首页</a> 创建解析 Feed。</div>
    </section>

    <p id="article-list-msg" class="my-feeds-inline-msg" aria-live="polite"></p>
  </main>

  <div id="feed-edit-modal" class="my-feeds-modal hidden" aria-hidden="true">
    <div class="my-feeds-modal-backdrop" id="feed-edit-backdrop"></div>
    <div class="my-feeds-modal-box" role="dialog" aria-labelledby="feed-edit-title">
      <h2 id="feed-edit-title">编辑 Feed</h2>
      <form id="feed-edit-form">
        <input type="hidden" id="feed-edit-id" />
        <label for="feed-edit-title-input">标题 <span class="req">*</span></label>
        <input type="text" id="feed-edit-title-input" required maxlength="255" class="my-feeds-input" autocomplete="off" />
        <label for="feed-edit-url">源站 URL</label>
        <input type="url" id="feed-edit-url" maxlength="500" class="my-feeds-input" placeholder="https://..." />
        <label for="feed-edit-desc">描述</label>
        <textarea id="feed-edit-desc" rows="3" class="my-feeds-textarea" placeholder="可选"></textarea>
        <label>Favicon</label>
        <div class="my-feeds-favicon-edit-row">
          <div id="feed-favicon-preview" class="my-feeds-favicon-preview">F</div>
          <div class="my-feeds-favicon-edit-actions">
            <button type="button" id="feed-favicon-fetch-btn" class="secondary-btn my-feeds-btn-tiny">从原网站拉取</button>
            <input type="url" id="feed-edit-favicon-url" maxlength="2000" class="my-feeds-input" placeholder="https://example.com/favicon.ico">
          </div>
        </div>
        <div class="my-feeds-form-row">
          <div class="my-feeds-form-col">
            <label for="feed-edit-favicon-text">自定义文字（字母/汉字）</label>
            <input type="text" id="feed-edit-favicon-text" maxlength="2" class="my-feeds-input" placeholder="如：新">
          </div>
          <div class="my-feeds-form-col">
            <label for="feed-edit-favicon-bg">背景色</label>
            <input type="color" id="feed-edit-favicon-bg" value="#2874a6" class="my-feeds-input my-feeds-input-color">
          </div>
        </div>
        <div class="my-feeds-form-row">
          <div class="my-feeds-form-col">
            <label for="feed-edit-type">类型</label>
            <input type="text" id="feed-edit-type" maxlength="50" class="my-feeds-input" placeholder="rss" />
          </div>
          <div class="my-feeds-form-col">
            <label for="feed-edit-interval">更新间隔（秒）</label>
            <input type="number" id="feed-edit-interval" min="60" max="604800" step="1" class="my-feeds-input" />
          </div>
        </div>
        <label class="my-feeds-check-row">
          <input type="checkbox" id="feed-edit-active" />
          启用采集与订阅
        </label>
        <label for="feed-edit-selectors">选择器规则（JSON，可选）</label>
        <textarea id="feed-edit-selectors" rows="6" class="my-feeds-textarea my-feeds-textarea--code" placeholder='例如：{"listSelector":"..."}'></textarea>
        <div class="my-feeds-modal-actions">
          <button type="button" class="secondary-btn" id="feed-edit-cancel">取消</button>
          <button type="submit" class="primary-btn" id="feed-edit-save">保存</button>
        </div>
        <p id="feed-edit-msg" class="my-feeds-modal-msg" aria-live="polite"></p>
      </form>
    </div>
  </div>

  <script src="config.js?v=1"></script>
  <script src="vendor/lucide.min.js"></script>
  <script src="header-menu.js?v=9"></script>
  <script src="lucide-init.js?v=1"></script>
  <script src="feed-edit.js?v=1"></script>
  <script src="my-feeds.js?v=5"></script>
</body>
</html>

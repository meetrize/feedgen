<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Display Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    
    .test-section {
      margin-bottom: 30px;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    
    .css-test {
      color: #2c3e50;
      background-color: #ecf0f1;
      padding: 15px;
      border-radius: 5px;
      margin: 10px 0;
    }
    
    .button-test {
      background-color: #3498db;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    
    .button-test:hover {
      background-color: #2980b9;
    }
  </style>
</head>
<body>
  <h1>CSS Display Test Page</h1>
  
  <div class="test-section">
    <h2>Basic Styling Test</h2>
    <p class="css-test">This paragraph should have a gray background and dark blue text.</p>
    <button class="button-test">Test Button</button>
  </div>
  
  <div class="test-section">
    <h2>Additional Elements</h2>
    <ul>
      <li>First item</li>
      <li>Second item</li>
      <li>Third item</li>
    </ul>
  </div>
  
  <script>
    console.log('CSS test page loaded');
  </script>
</body>
</html>

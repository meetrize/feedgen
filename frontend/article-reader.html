<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章阅读 - FeedGen</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/x-icon" href="icons/favicon.ico">
  <style>
    body.article-reader-page {
      overflow-x: hidden;
      max-width: 100%;
    }

    .article-reader-main {
      max-width: none;
      margin-top: 0;
      padding: 0 0rem 0;
      height: 100vh;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      position: relative;
      --reader-sidebar-width: 52px;
    }

    .article-reader-layout {
      width: 100%;
      flex: 1;
      min-height: 0;
      height: 100%;
      overflow: hidden;
      --reader-sidebar-width: 52px;
      display: flex;
      flex-direction: row;
      align-items: stretch;
    }

    .article-reader-layout.is-sidebar-open .article-reader-sidebar {
      display: block;
    }

    .article-reader-layout.is-sidebar-open {
      grid-template-columns: minmax(0, 1fr);
      gap: 0;
    }

    .article-reader-layout.is-sidebar-open .article-reader-content {
      grid-column: 1 / -1;
      width: 100%;
    }

    @media (max-width: 896px) {
      .article-reader-main.has-sidebar-open {
        padding-left: 0;
        margin-left: 52px;
      }

      .article-reader-main.has-sidebar-open .article-reader-content {
        width: calc(100% - 52px);
        margin-left: 0;
      }
    }

    .article-reader-layout.is-feed-panel-collapsed .article-reader-feed-panel {
      display: none;
    }

    .article-reader-layout.is-feed-panel-open .article-reader-feed-panel {
      display: block;
    }

    .article-reader-layout.is-feed-panel-open .article-reader-content,
    .article-reader-layout.is-feed-panel-collapsed .article-reader-content {
      margin-left: 0;
      width: 100%;
    }

    .article-reader-layout.is-feed-panel-open .article-reader-list-wrap {
      width: 100%;
    }

    .article-reader-layout.is-reader-mobile-portrait {
      padding-left: 0 !important;
    }

    @media (max-width: 896px) {
      .article-reader-main.has-feed-panel-open:not(.has-sidebar-open) {
        padding-left: 0;
        margin-left: 52px;
      }

      .article-reader-main.has-feed-panel-open:not(.has-sidebar-open) .article-reader-content {
        width: calc(100% - 52px);
        margin-left: 0;
      }
    }

    .article-reader-layout.is-reader-mobile-portrait.has-feed-panel-open .article-reader-content {
      width: 100% !important;
      margin-left: 0 !important;
    }

    .article-reader-sidebar-mask {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.28);
      backdrop-filter: blur(1px);
      z-index: 180;
    }

    .article-reader-sidebar-mask.is-visible {
      display: block;
    }

    .article-reader-layout .article-reader-content {
      min-width: 0;
      flex: 1;
      min-height: 0;
      height: 100%;
      max-width: 100%;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    .article-reader-feed-panel {
      align-self: stretch;
      height: 100%;
      min-height: 0;
      overflow-y: auto;
      position: sticky;
      top: 0;
      flex: 0 0 300px;
      width: 300px;
      min-width: 300px;
    }

    @media (max-width: 896px) {
      .article-reader-layout {
        padding-left: 0 !important;
      }

      .article-reader-layout .article-reader-content {
        width: 100% !important;
        margin-left: 0 !important;
      }

      .article-reader-layout .article-reader-feed-panel {
        display: none !important;
      }

      .article-reader-layout.is-sidebar-open .article-reader-feed-panel {
        display: block !important;
      }

      .article-reader-layout.is-sidebar-collapsed .article-reader-feed-panel {
        display: none !important;
      }
    }

    .article-reader-content-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 2px;
      padding: 10px 0;
      min-width: 0;
    }

    .article-reader-sidebar-toggle-btn {
      display: none;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      padding: 0;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      background: #fff;
      color: #24292f;
      cursor: pointer;
      flex: 0 0 auto;
      position: relative;
      z-index: 2;
    }

    .article-reader-sidebar-toggle-btn:hover {
      color: #0969da;
      border-color: #0969da;
    }

    .article-reader-sidebar-toggle-btn.active {
      color: #0969da;
      border-color: #0969da;
      background: #e7f1ff;
    }

    .article-reader-content-title-wrap {
      position: relative;
      min-width: 0;
      flex: 1;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .article-reader-current-feed-btn {
      max-width: 100%;
      min-width: 0;
      min-height: 30px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      background: #fff;
      color: #1f3344;
      font: inherit;
      font-size: 0.86rem;
      font-weight: 600;
      padding: 0 10px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow: none;
    }

    .article-reader-current-feed-btn:hover,
    .article-reader-current-feed-btn[aria-expanded="true"] {
      color: #0969da;
      border-color: #0969da;
      background: #fff;
    }

    .article-reader-current-feed-btn .current-feed-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .article-reader-current-feed-btn .current-feed-icon,
    .article-reader-current-feed-btn .current-feed-icon svg {
      width: 17px;
      height: 17px;
      flex: 0 0 auto;
    }

    .article-reader-title-filter-menu {
      position: absolute;
      left: 0;
      top: calc(100% + 8px);
      min-width: 154px;
      padding: 6px;
      border: 1px solid #d0d7de;
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.16);
      z-index: 80;
    }

    .article-reader-title-filter-menu.hidden {
      display: none;
    }

    .article-reader-title-filter-option {
      width: 100%;
      border: 0;
      background: transparent;
      color: #24292f;
      text-align: left;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .article-reader-title-filter-option:hover {
      background: #f6f8fa;
    }

    .article-reader-title-filter-option.active {
      background: #e7f1ff;
      color: #0969da;
      font-weight: 600;
    }

    .article-reader-toolbar {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
      flex-shrink: 0;
    }

    .article-reader-toolbar-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .article-reader-mobile-search-btn {
      display: none;
    }

    .article-reader-search-popup {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      z-index: 280;
      width: min(320px, calc(100vw - 24px));
      padding: 10px;
      border: 1px solid #d0d7de;
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.16);
      box-sizing: border-box;
    }

    .article-reader-search-popup.hidden {
      display: none;
    }

    .article-reader-search-popup-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .article-reader-search-popup-input {
      flex: 1;
      min-width: 0;
      height: 34px;
      padding: 0 10px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: 0.88rem;
      outline: none;
      box-sizing: border-box;
    }

    .article-reader-search-popup-input:focus {
      border-color: #0969da;
      box-shadow: 0 0 0 2px rgba(9, 105, 218, 0.15);
    }

    .article-reader-search-popup-submit {
      flex: 0 0 auto;
      height: 34px;
      padding: 0 12px;
      border: 1px solid #0969da;
      border-radius: 6px;
      background: #0969da;
      color: #fff;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .article-reader-search-popup-submit:hover {
      background: #0860ca;
      border-color: #0860ca;
    }

    .article-reader-search {
      min-width: 120px;
      max-width: 220px;
      flex: 1 1 160px;
      width: auto;
      height: 32px;
      box-sizing: border-box;
      padding: 0 10px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      outline: none;
    }

    .article-reader-search:focus {
      border-color: #0969da;
      box-shadow: 0 0 0 2px rgba(9, 105, 218, 0.15);
    }

    .article-reader-layout-menu {
      position: absolute;
      top: 38px;
      right: 0;
      min-width: 120px;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 8px 24px rgba(140, 149, 159, 0.2);
      padding: 6px;
      z-index: 20;
    }

    .article-reader-layout-menu.hidden {
      display: none;
    }

    .article-reader-layout-option {
      width: 100%;
      border: 0;
      background: transparent;
      text-align: left;
      padding: 6px 8px;
      border-radius: 6px;
      cursor: pointer;
    }

    .article-reader-layout-option:hover {
      background: #f6f8fa;
    }

    .article-reader-layout-option.active {
      background: #e7f1ff;
      color: #0969da;
      font-weight: 600;
    }

    .article-reader-toolbar-icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .article-reader-toolbar-icon-btn .toolbar-icon {
      width: 15px;
      height: 15px;
      flex: 0 0 auto;
    }

    #reader-voice-read-btn.is-playing {
      color: #0969da;
      border-color: #0969da;
      background: #e7f1ff;
    }

    #reader-voice-read-btn.is-playing .voice-animate {
      display: inline-block;
      animation: voice-pulse 0.8s ease-in-out infinite;
    }

    @keyframes voice-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    #article-reader-list.layout-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    #article-reader-list.layout-cards .article-reader-item {
      margin: 0;
      height: 100%;
    }

    /* 三列网格：图标固定 | 标题+摘要可压缩 | 右侧时间与按钮宽度按内容固定，避免被摘要挤没 */
    .article-reader-item-title-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .article-reader-item-title-stack {
      min-width: 0;
      max-width: 100%;
      overflow: hidden;
    }

    .article-reader-item-title-row-trail {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      width: max-content;
      justify-self: end;
    }

    .article-reader-item-title-row-trail > * {
      flex-shrink: 0;
    }

    .article-reader-item-title-stack .article-reader-item-title {
      margin-bottom: 0;
    }

    #article-reader-list:not(.layout-title-only) .article-reader-item-inline-summary {
      display: none !important;
    }

    .article-reader-favicon-cell {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #f2f5f8;
      border: 1px solid #dce4ec;
      color: #1f3344;
      font-size: 10px;
      font-weight: 700;
      flex: 0 0 auto;
      line-height: 1;
    }

    .article-reader-favicon-cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .article-reader-feed-btn-inner {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
      width: 100%;
    }

    .article-reader-feed-btn-text {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      flex: 1;
      overflow: hidden;
    }

    .article-reader-feed-btn-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .article-reader-feed-crawl-tag {
      display: inline-flex;
      align-items: center;
      flex: 0 0 auto;
      max-width: 92px;
      padding: 1px 6px;
      border-radius: 999px;
      background: #fee2e2;
      color: #991b1b;
      font-size: 10px;
      font-weight: 700;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bulletin-feed-card-title-wrap {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      flex: 1;
      overflow: hidden;
    }

    .bulletin-feed-card-title-wrap .bulletin-feed-card-title {
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .article-reader-item-time {
      font-size: 0.75rem;
      color: #7a8794;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .article-reader-item-time-short {
      display: none;
    }

    #article-reader-list.layout-title-only .article-reader-item {
      padding: 0.45rem 0.6rem;
      border-radius: 8px;
      margin: 0;
    }

    #article-reader-list.layout-title-only {
      gap: 0;
    }

    #article-reader-list.layout-title-only .article-reader-item-title-stack {
      display: flex;
      flex-direction: row;
      align-items: baseline;
      gap: 0.5rem;
      min-width: 0;
      max-width: 100%;
      overflow: hidden;
    }

    #article-reader-list.layout-title-only .article-reader-item-title-stack--no-summary .article-reader-item-title {
      flex: 1;
      min-width: 0;
      max-width: none;
    }

    #article-reader-list.layout-title-only .article-reader-item-title {
      margin: 0;
      font-size: 0.92rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
      flex: 0 1 auto;
      min-width: 0;
      max-width: 52%;
    }

    #article-reader-list.layout-title-only .article-reader-item-inline-summary {
      flex: 1 1 0;
      min-width: 0;
      font-size: 0.76rem;
      color: #9aa7b2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.35;
      cursor: default;
    }

    /* 摘要即时提示（不依赖浏览器 title 延迟；挂载在 body 避免被 overflow 裁切） */
    #article-reader-summary-tip.article-reader-summary-tip {
      position: fixed;
      z-index: 100050;
      max-width: min(420px, calc(100vw - 16px));
      max-height: min(50vh, 360px);
      overflow: auto;
      padding: 10px 12px;
      background: #1f3344;
      color: #f0f4f8;
      font-size: 0.82rem;
      line-height: 1.45;
      border-radius: 8px;
      box-shadow: 0 8px 28px rgba(15, 23, 42, 0.38);
      pointer-events: none;
      white-space: pre-wrap;
      word-break: break-word;
      box-sizing: border-box;
    }

    .article-reader-feed-name-tip {
      position: fixed;
      z-index: 100050;
      padding: 5px 10px;
      background: rgba(31, 51, 68, 0.92);
      backdrop-filter: blur(6px);
      color: #f0f4f8;
      font-size: 0.78rem;
      font-weight: 500;
      line-height: 1.4;
      border-radius: 14px;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.22);
      pointer-events: none;
      white-space: nowrap;
      box-sizing: border-box;
    }

    #article-reader-list.layout-title-only .article-reader-item-meta,
    #article-reader-list.layout-title-only .article-reader-item-desc,
    #article-reader-list.layout-title-only .article-reader-link {
      display: none;
    }

    #article-reader-list.layout-title-only .article-reader-item.is-title-expanded .article-reader-item-inline-summary {
      display: none !important;
    }

    #article-reader-list.layout-title-only .article-reader-item.is-title-expanded .article-reader-item-title {
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      margin-bottom: 0.35rem;
      max-width: none;
    }

    #article-reader-list.layout-title-only .article-reader-item.is-title-expanded .article-reader-item-desc,
    #article-reader-list.layout-title-only .article-reader-item.is-title-expanded .article-reader-link {
      display: block;
    }

    #article-reader-list.layout-title-only .article-reader-item.is-title-expanded .article-reader-item-desc {
      margin: 0 0 0.4rem;
      font-size: 0.85rem;
      color: #506273;
      line-height: 1.45;
    }

    /* ===== 板报布局 ===== */
    .article-reader-content.is-bulletin-layout .article-reader-list-wrap {
      padding-right: 4px;
    }

    .article-reader-content.is-bulletin-layout .article-reader-detail {
      display: none !important;
    }

    .article-reader-content.is-bulletin-layout .article-reader-pagination {
      display: none !important;
    }

    .article-reader-content.is-bulletin-layout .article-reader-reading-layout {
      display: block;
      overflow-y: auto;
      overflow-x: hidden;
    }

    #article-reader-list.layout-bulletin {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 14px;
      padding: 4px 4px 8px;
      align-content: start;
    }

    @media (max-width: 896px) {
      #article-reader-list.layout-bulletin {
        grid-template-columns: minmax(0, 1fr) !important;
      }
    }

    @media (min-width: 1600px) {
      #article-reader-list.layout-bulletin {
        grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      }
    }

    .bulletin-feed-card {
      border: 1px solid #d0d7de;
      border-radius: 10px;
      background: #fff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: 460px;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.04);
    }

    .bulletin-feed-card.is-hidden {
      display: none;
    }

    .bulletin-feed-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-bottom: 1px solid #eceff3;
      background: #fafbfc;
      flex-shrink: 0;
    }

    .bulletin-feed-card-header .article-reader-favicon-cell {
      flex: 0 0 auto;
    }

    .bulletin-feed-card-title {
      font-size: 0.88rem;
      font-weight: 600;
      color: #1f3344;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1.3;
    }

    .bulletin-feed-card-count {
      font-size: 0.72rem;
      color: #9aa7b2;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .bulletin-feed-card-body {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
      min-height: 0;
    }

    .bulletin-feed-card-body::-webkit-scrollbar {
      width: 4px;
    }
    .bulletin-feed-card-body::-webkit-scrollbar-thumb {
      background: #d0d7de;
      border-radius: 4px;
    }

    .bulletin-feed-article-item {
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 4px 12px;
      cursor: pointer;
    }

    .bulletin-feed-article-item:hover {
      background: #eff4fa;
    }

    .bulletin-feed-article-item.is-read {
      opacity: 0.55;
    }

    .bulletin-feed-article-item.is-read .bulletin-feed-article-title {
      text-decoration: line-through;
    }

    .bulletin-feed-article-time {
      font-size: 0.68rem;
      color: #a0aeb8;
      white-space: nowrap;
      flex-shrink: 0;
      min-width: 32px;
    }

    .bulletin-hide-time .bulletin-feed-article-time {
      display: none;
    }

    .bulletin-feed-article-title {
      font-size: 0.8rem;
      color: #1f3344;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
      line-height: 1.35;
    }

    .bulletin-feed-card-empty {
      padding: 16px 12px;
      text-align: center;
      color: #9aa7b2;
      font-size: 0.78rem;
    }

    .bulletin-feed-card-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 12px;
      color: #9aa7b2;
      font-size: 0.78rem;
    }

    /* 板报定制面板 */
    .bulletin-customize-overlay {
      position: fixed;
      inset: 0;
      z-index: 10010;
      background: rgba(15, 23, 42, 0.38);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bulletin-customize-panel {
      width: min(520px, calc(100vw - 32px));
      max-height: min(640px, calc(100vh - 80px));
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 16px 48px rgba(15, 23, 42, 0.26);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .bulletin-customize-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #eceff3;
    }

        margin-top: 0;
        pointer-events: none;

        bottom: auto;

  <script>
    (function syncReaderViewportHeight() {
      function updateOffset() {
        var headerEl = document.getElementById("global-header");
        var topOffset = headerEl ? headerEl.getBoundingClientRect().height : 64;
        var contentHeadEl = document.querySelector(".article-reader-content-head");
        var contentHeadOffset = contentHeadEl ? contentHeadEl.getBoundingClientRect().height : 56;
        document.documentElement.style.setProperty("--reader-top-offset", (topOffset || 84) + "px");
        document.documentElement.style.setProperty("--reader-content-head-offset", (contentHeadOffset || 56) + "px");
      }
      window.addEventListener("resize", updateOffset);
      window.addEventListener("load", updateOffset);
      updateOffset();
    })();

    (function initSidebarToggle() {
      var layoutEl = document.querySelector(".article-reader-layout");
      var globalSidebarEl = document.querySelector(".sidebar");
      var sidebarMaskEl = document.getElementById("article-reader-sidebar-mask");
      var toggleBtn = document.getElementById("reader-sidebar-toggle-btn");
      var feedPanelToggleBtn = document.getElementById("reader-feed-panel-toggle-btn");
      var feedPanelEl = document.querySelector(".article-reader-feed-panel");
      if (!layoutEl || !globalSidebarEl || (!toggleBtn && !feedPanelToggleBtn)) return;

      var mobileMq = window.matchMedia("(max-width: 896px)");
      var portraitMq = window.matchMedia("(orientation: portrait)");
      var isMobileSidebarMode = function () {
        return mobileMq.matches && portraitMq.matches;
      };

      function syncToggleState(sidebarVisible, feedPanelVisible) {
        var isSidebarOpen = !!sidebarVisible;
        var isFeedPanelOpen = !!feedPanelVisible;
        if (toggleBtn) {
          toggleBtn.setAttribute("title", isSidebarOpen ? "隐藏左侧工具栏" : "打开左侧工具栏");
          toggleBtn.setAttribute("aria-label", isSidebarOpen ? "隐藏左侧工具栏" : "打开左侧工具栏");
          toggleBtn.setAttribute("aria-expanded", String(isSidebarOpen));
          toggleBtn.classList.toggle("active", isSidebarOpen);
        }
        if (feedPanelToggleBtn) {
          var feedPanelIcon = isFeedPanelOpen ? "panel-left-close" : "panel-left-open";
          feedPanelToggleBtn.setAttribute("title", isFeedPanelOpen ? "关闭feed面板" : "打开feed面板");
          feedPanelToggleBtn.setAttribute("aria-label", isFeedPanelOpen ? "关闭feed面板" : "打开feed面板");
          feedPanelToggleBtn.setAttribute("aria-expanded", String(isFeedPanelOpen));
          var feedPanelIconEl = feedPanelToggleBtn.querySelector("[data-lucide]");
          if (feedPanelIconEl) feedPanelIconEl.setAttribute("data-lucide", feedPanelIcon);
          if (typeof window.refreshLucideIcons === "function") window.refreshLucideIcons();
        }
        if (feedPanelEl) {
          feedPanelEl.classList.toggle("is-open", isFeedPanelOpen);
        }
      }

      function setSidebarVisible(visible) {
        var nextVisible = !!visible;
        globalSidebarEl.classList.toggle("is-visible", nextVisible);
        layoutEl.classList.toggle("is-sidebar-open", nextVisible);
        layoutEl.classList.toggle("is-sidebar-collapsed", !nextVisible);
        document.querySelector(".article-reader-main").classList.toggle("has-sidebar-open", nextVisible);
        if (sidebarMaskEl) {
          sidebarMaskEl.classList.remove("is-visible");
          sidebarMaskEl.setAttribute("aria-hidden", "true");
        }
        syncToggleState(nextVisible, layoutEl.classList.contains("is-feed-panel-open"));
      }

      function setFeedPanelVisible(visible) {
        var panelVisible = !!visible;
        layoutEl.classList.toggle("is-feed-panel-open", panelVisible);
        layoutEl.classList.toggle("is-feed-panel-collapsed", !panelVisible);
        document.querySelector(".article-reader-main").classList.toggle("has-feed-panel-open", panelVisible);
        if (feedPanelEl) {
          feedPanelEl.classList.toggle("is-open", panelVisible);
        }
        syncToggleState(globalSidebarEl.classList.contains("is-visible"), panelVisible);
      }

      function applyResponsiveMode() {
        var mobileMode = mobileMq.matches || portraitMq.matches;
        layoutEl.classList.toggle("is-reader-mobile-portrait", mobileMode);
        if (mobileMode) {
          setSidebarVisible(false);
          setFeedPanelVisible(false);
        } else {
          setSidebarVisible(true);
          setFeedPanelVisible(true);
        }
      }

      function bindToggle(btn, handler) {
        if (!btn) return;
        btn.addEventListener("click", function (event) {
          event.preventDefault();
          handler();
        });
      }

      bindToggle(toggleBtn, function () {
        setSidebarVisible(!globalSidebarEl.classList.contains("is-visible"));
      });

      bindToggle(feedPanelToggleBtn, function () {
        setFeedPanelVisible(!layoutEl.classList.contains("is-feed-panel-open"));
      });

      if (sidebarMaskEl) {
        sidebarMaskEl.addEventListener("click", function () {
          setSidebarVisible(false);
        });
      }

      if (typeof mobileMq.addEventListener === "function") {
        mobileMq.addEventListener("change", applyResponsiveMode);
        portraitMq.addEventListener("change", applyResponsiveMode);
      } else {
        if (typeof mobileMq.addListener === "function") mobileMq.addListener(applyResponsiveMode);
        if (typeof portraitMq.addListener === "function") portraitMq.addListener(applyResponsiveMode);
      }
      window.addEventListener("orientationchange", function () {
        setTimeout(applyResponsiveMode, 200);
      });

      applyResponsiveMode();
    })();

    (function initArticleReaderToolbar() {
      var searchInput = document.getElementById("reader-search-input");
      var mobileSearchBtn = document.getElementById("reader-mobile-search-btn");
      var searchPopup = document.getElementById("reader-search-popup");
      var searchPopupInput = document.getElementById("reader-search-popup-input");
      var searchSubmitBtn = document.getElementById("reader-search-submit-btn");
      var markReadBtn = document.getElementById("reader-mark-read-btn");
      var topRefreshBtn = document.getElementById("reader-top-refresh-btn");
      var sidebarRefreshBtn = document.getElementById("reader-refresh-btn");
      var layoutBtn = document.getElementById("reader-layout-btn");
      var layoutMenu = document.getElementById("reader-layout-menu");
      var listEl = document.getElementById("article-reader-list");
      var contentEl = document.querySelector(".article-reader-content");
      var layoutStorageKey = "article_reader_layout_mode";
      var mobileMq = window.matchMedia("(max-width: 896px)");
      var portraitMq = window.matchMedia("(orientation: portrait)");
      if (!searchInput || !markReadBtn || !topRefreshBtn || !layoutBtn || !layoutMenu || !listEl || !contentEl) return;

      function isMobileToolbarMode() {
        return mobileMq.matches || portraitMq.matches;
      }

      function closeSearchPopup() {
        if (!searchPopup) return;
        searchPopup.classList.add("hidden");
        if (mobileSearchBtn) {
          mobileSearchBtn.classList.remove("is-open");
          mobileSearchBtn.setAttribute("aria-expanded", "false");
        }
      }

      function openSearchPopup() {
        if (!searchPopup) return;
        searchPopup.classList.remove("hidden");
        if (mobileSearchBtn) {
          mobileSearchBtn.classList.add("is-open");
          mobileSearchBtn.setAttribute("aria-expanded", "true");
        }
        if (searchPopupInput) {
          searchPopupInput.value = searchInput.value || "";
          searchPopupInput.focus();
        }
      }

      function submitMobileSearch() {
        if (!searchPopupInput) return;
        searchInput.value = searchPopupInput.value;
        if (typeof window.articleReaderOnSearchInput === "function") {
          window.articleReaderOnSearchInput();
        }
        closeSearchPopup();
      }

      searchInput.addEventListener("input", function () {
        if (isMobileToolbarMode()) return;
        if (typeof window.articleReaderOnSearchInput === "function") {
          window.articleReaderOnSearchInput();
        }
      });

      if (mobileSearchBtn) {
        mobileSearchBtn.addEventListener("click", function (event) {
          event.stopPropagation();
          if (searchPopup && searchPopup.classList.contains("hidden")) {
            openSearchPopup();
          } else {
            closeSearchPopup();
          }
        });
      }

      if (searchSubmitBtn) {
        searchSubmitBtn.addEventListener("click", function (event) {
          event.preventDefault();
          submitMobileSearch();
        });
      }

      if (searchPopupInput) {
        searchPopupInput.addEventListener("keydown", function (event) {
          if (event.key === "Enter") {
            event.preventDefault();
            submitMobileSearch();
          } else if (event.key === "Escape") {
            closeSearchPopup();
          }
        });
      }

      markReadBtn.addEventListener("click", function () {
        var items = listEl.querySelectorAll(".article-reader-item");
        items.forEach(function (item) {
          item.classList.add("is-read");
        });
      });

      topRefreshBtn.addEventListener("click", function () {
        if (sidebarRefreshBtn) sidebarRefreshBtn.click();
      });

      function closeLayoutMenu() {
        layoutMenu.classList.add("hidden");
        layoutBtn.setAttribute("aria-expanded", "false");
      }

      function openLayoutMenu() {
        layoutMenu.classList.remove("hidden");
        layoutBtn.setAttribute("aria-expanded", "true");
      }

      layoutBtn.addEventListener("click", function (event) {
        event.stopPropagation();
        if (layoutMenu.classList.contains("hidden")) {
          openLayoutMenu();
        } else {
          closeLayoutMenu();
        }
      });

      layoutMenu.querySelectorAll(".article-reader-layout-option").forEach(function (optionBtn) {
        optionBtn.addEventListener("click", function () {
          var layout = optionBtn.getAttribute("data-layout");
          applyLayout(layout);
          try {
            localStorage.setItem(layoutStorageKey, layout);
          } catch (e) {}
          closeLayoutMenu();
        });
      });

      function applyLayout(layout) {
        var layoutValue = layout || "title-only";
        var validLayouts = ["title-only", "list", "columns", "columns-iframe", "cards", "bulletin"];
        if (validLayouts.indexOf(layoutValue) === -1) {
          layoutValue = "title-only";
        }

        listEl.classList.remove("layout-list", "layout-cards", "layout-title-only", "layout-bulletin");
        contentEl.classList.toggle("is-columns-layout", layoutValue === "columns");
        contentEl.classList.toggle("is-columns-iframe-layout", layoutValue === "columns-iframe");
        contentEl.classList.toggle("is-bulletin-layout", layoutValue === "bulletin");
        if (layoutValue === "bulletin") listEl.classList.add("layout-bulletin");
        else if (layoutValue === "cards") listEl.classList.add("layout-cards");
        else if (layoutValue === "title-only") listEl.classList.add("layout-title-only");
        else listEl.classList.add("layout-list");

        document.dispatchEvent(new CustomEvent("article-reader-layout-change", { detail: { layout: layoutValue } }));

        layoutMenu.querySelectorAll(".article-reader-layout-option").forEach(function (el) {
          el.classList.toggle("active", el.getAttribute("data-layout") === layoutValue);
        });
      }

      var savedLayout = null;
      try {
        savedLayout = localStorage.getItem(layoutStorageKey);
      } catch (e) {}
      applyLayout(savedLayout || "title-only");

      document.addEventListener("click", function (event) {
        if (!layoutMenu.contains(event.target) && event.target !== layoutBtn) {
          closeLayoutMenu();
        }
        if (
          searchPopup &&
          !searchPopup.classList.contains("hidden") &&
          !searchPopup.contains(event.target) &&
          event.target !== mobileSearchBtn &&
          !(mobileSearchBtn && mobileSearchBtn.contains(event.target))
        ) {
          closeSearchPopup();
        }
      });
    })();
  </script>
</body>
</html>
